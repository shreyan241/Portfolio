<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Portfolio/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Shreyan Sood - Machine Learning Engineer & Data Scientist based in Austin, TX. Agentic AI systems, large-scale distributed data infrastructure, and causal impact modeling."
    />
    <title>Shreyan Sood - ML Engineer & Data Scientist</title>

    <!-- Theme color (warm light / fireside dark) -->
    <meta
      name="theme-color"
      content="#fbf6ec"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1e1813"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Shreyan Sood - ML Engineer & Data Scientist" />
    <meta
      property="og:description"
      content="Agentic AI systems, large-scale distributed data infrastructure, and causal impact modeling. Currently an Analytics Engineer at Amazon."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shreyan241.github.io/Portfolio/" />
    <meta property="og:image" content="https://shreyan241.github.io/Portfolio/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Shreyan Sood - ML Engineer & Data Scientist" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shreyan Sood - ML Engineer & Data Scientist" />
    <meta
      name="twitter:description"
      content="Agentic AI systems, large-scale distributed data infrastructure, and causal impact modeling. Currently an Analytics Engineer at Amazon."
    />
    <meta name="twitter:image" content="https://shreyan241.github.io/Portfolio/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SKC784YJPS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-SKC784YJPS");
    </script>
    <script>
      // Apply theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem("portfolio-theme");
          var prefersLight = window.matchMedia(
            "(prefers-color-scheme: light)"
          ).matches;
          var theme = stored || (prefersLight ? "light" : "dark");
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
